// Live countdown component — ticks every 100ms with decimal percentage
function LiveCountdown({targetDay,currentDay,phaseName}){
  const [now,setNow]=useState(Date.now());
  useEffect(()=>{
    const t=setInterval(()=>setNow(Date.now()),100);
    return ()=>clearInterval(t);
  },[]);

  // Calculate precise time remaining
  // Assume each "day" started at account creation, mock: March 15 2026
  // Account started March 22 2026 — warmup (14 days) ends April 5
  // Today is March 30, so we're on day 8 of 14 — about 57% through warmup
  const startDate=new Date('2026-03-22T06:00:00');
  const phaseEndDate=new Date(startDate.getTime()+targetDay*24*60*60*1000);
  const phaseStartDate=new Date(startDate.getTime()+currentDay*24*60*60*1000);
  const totalMs=phaseEndDate.getTime()-phaseStartDate.getTime();
  const elapsedMs=now-phaseStartDate.getTime();
  const remainingMs=Math.max(0,phaseEndDate.getTime()-now);

  const days=Math.floor(remainingMs/(24*60*60*1000));
  const hours=Math.floor((remainingMs%(24*60*60*1000))/(60*60*1000));
  const mins=Math.floor((remainingMs%(60*60*1000))/(60*1000));
  const secs=Math.floor((remainingMs%(60*1000))/1000);

  const pct=totalMs>0?Math.min(100,(elapsedMs/totalMs)*100):100;

  return <div style={{display:"flex",alignItems:"center",borderBottom:"1px solid var(--border)"}}>
    <div style={{flex:1,padding:"16px 24px"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:4}}>
        <span style={{fontSize:12,fontWeight:600,color:"var(--text)"}}>Time until {phaseName} completed</span>
        <span style={{fontSize:13,fontFamily:"var(--mono)",color:"var(--green)",fontWeight:700}}>{pct.toFixed(4)}%</span>
      </div>
      <div style={{height:5,background:"var(--bg3)",borderRadius:3,overflow:"hidden",marginBottom:6}}>
        <div style={{height:"100%",width:pct.toFixed(2)+"%",borderRadius:3,background:"var(--green)",transition:"width .1s linear"}}/>
      </div>
      <div style={{fontSize:10,color:"var(--text3)"}}>Progress towards next phase</div>
    </div>
    <div style={{borderLeft:"1px solid var(--border)",padding:"14px 20px",textAlign:"center",minWidth:200}}>
      <div style={{fontFamily:"var(--mono)",fontSize:20,fontWeight:700,color:"var(--text)",lineHeight:1,letterSpacing:"-0.5px"}}>
        {days}<span style={{fontSize:10,fontWeight:400,color:"var(--text3)"}}>d </span>
        {String(hours).padStart(2,'0')}<span style={{fontSize:10,fontWeight:400,color:"var(--text3)"}}>h </span>
        {String(mins).padStart(2,'0')}<span style={{fontSize:10,fontWeight:400,color:"var(--text3)"}}>m </span>
        {String(secs).padStart(2,'0')}<span style={{fontSize:10,fontWeight:400,color:"var(--text3)"}}>s</span>
      </div>
      <div style={{fontSize:9,color:"var(--text3)",marginTop:3}}>remaining</div>
    </div>
    <div style={{borderLeft:"1px solid var(--border)",padding:"14px 20px",minWidth:90}}>
      <div style={{fontSize:9,color:"var(--text3)"}}>Mailboxes</div>
      <div style={{fontFamily:"var(--mono)",fontSize:20,fontWeight:600,color:"var(--text)",lineHeight:1,marginTop:2}}>{D.mbs.length}</div>
      <div onClick={()=>typeof nav!=='undefined'&&nav("mailboxes")} style={{fontSize:10,color:"var(--green)",cursor:"pointer",marginTop:2,fontWeight:500}}>View →</div>
    </div>
  </div>;
}

const cc={warm:"var(--green)",negative:"var(--red)",auto_reply:"var(--blue)",unsubscribe:"var(--text3)"};
const cb={warm:"var(--green-bg)",negative:"var(--red-bg)",auto_reply:"var(--blue-bg)",unsubscribe:"rgba(255,255,255,0.03)"};

const G={background:"var(--bg)",border:"1px solid var(--border)",borderRadius:0};

function Card({children,style,className,onClick}){
  return <div onClick={onClick} className={className} style={{...G,transition:"all .15s",...style}}>{children}</div>;
}

// Grid cell style — borders extend edge to edge
function Cell({children,style,border,span}){
  return <div style={{padding:"20px 24px",borderBottom:border!==false?"1px solid var(--border)":"none",...style}}>{children}</div>;
}

function Stat({label,val,sub,color,bar,pct}){
  return <Card style={{padding:"20px 24px"}}>
    <div style={{fontSize:10,textTransform:"uppercase",letterSpacing:"1.5px",color:"var(--text3)",fontWeight:600,marginBottom:10}}>{label}</div>
    <div style={{fontFamily:"var(--mono)",fontSize:30,fontWeight:700,color:color||"var(--text)",lineHeight:1}}>{val}</div>
    {sub&&<div style={{fontSize:11,color:"var(--text2)",marginTop:6,fontFamily:"var(--mono)"}}>{sub}</div>}
    {bar&&<div style={{height:3,background:"var(--bg3)",borderRadius:2,marginTop:14,overflow:"hidden"}}>
      <div style={{height:"100%",width:Math.min(pct,100)+"%",borderRadius:2,background:"var(--green)",}}/>
    </div>}
  </Card>;
}

function getPhase(day){
  if(day>=28)return{name:"Full capacity",color:"var(--green)",weekly:2100};
  if(day>=21)return{name:"Phase 2",color:"var(--green)",weekly:1400};
  if(day>=14)return{name:"Phase 1",color:"var(--green)",weekly:840};
  return{name:"Warmup",color:"var(--orange)",weekly:420};
}

  const rr=c.sent>0?(c.rep/c.sent*100).toFixed(1):"0.0";
  const phase=getPhase(c.day);

                  <div style={{fontSize:8,color:"var(--text3)",marginTop:2}}>{s.l}</div>
                </div>)}
            </div>

            {/* Phase experiments */}
            {ph.experiments.length>0?<>
              <div style={{fontSize:10,fontWeight:600,color:"var(--text2)",marginBottom:8}}>Experiments during this phase ({ph.experiments.length})</div>
              {ph.experiments.map((e,i)=>{
                const won=e.winner==="challenger";
                return <div key={i} style={{display:"flex",gap:10,paddingBottom:8,marginBottom:8,borderBottom:i<ph.experiments.length-1?"1px solid var(--border)":"none"}}>
                  <div style={{width:20,height:20,borderRadius:6,background:won?"var(--green-bg)":"transparent",border:"1px solid "+(won?"var(--green-bd)":"var(--border)"),display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,marginTop:1}}>
                    <span style={{fontSize:8,fontWeight:700,color:won?"var(--green)":"var(--text3)"}}>{won?"↑":"="}</span>
                  </div>
                  <div style={{flex:1}}>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                      <span style={{fontSize:11,fontWeight:600}}>{e.id}: {e.test}</span>
                      <div style={{display:"flex",alignItems:"center",gap:4}}>
                        <span style={{fontSize:10,fontFamily:"var(--mono)",color:"var(--text3)"}}>{e.baseline}%</span>
                        <span style={{fontSize:10,color:won?"var(--green)":"var(--text3)"}}>→</span>
                        <span style={{fontSize:10,fontFamily:"var(--mono)",fontWeight:600,color:won?"var(--green)":"var(--text3)"}}>{e.challenger}%</span>
                      </div>
                    </div>
                    <div style={{fontSize:10,color:"var(--text3)",marginTop:2}}>{e.learning}</div>
                  </div>
                </div>;})}
            </>:<div style={{fontSize:11,color:"var(--text3)",fontStyle:"italic"}}>No outreach experiments during this phase — mailboxes were building reputation.</div>}
          </div>;
        })()}

        {!selectedPhase&&<div style={{marginBottom:24}}/>}

        {/* REPLY RATE CHART — visual improvement over time */}
        <div style={{fontSize:11,fontWeight:700,textTransform:"uppercase",letterSpacing:"1px",color:"var(--text3)",marginBottom:10}}>
          Reply rate improvement <span style={{color:"var(--green)",fontWeight:600,textTransform:"none",letterSpacing:0,marginLeft:8}}>0.8% → {Math.max(c.a.rate,c.b.rate)}% (+{(Math.max(c.a.rate,c.b.rate)-0.8).toFixed(1)}%)</span>
        </div>
        <Card style={{padding:"20px 24px 16px",marginBottom:24}}>
          <svg width="100%" viewBox={`0 0 ${chartW} ${chartH+30}`} style={{overflow:"visible"}}>
            {/* Grid lines */}
            {[0,1,2,3,4].map(v=><g key={v}>
              <line x1={0} y1={chartH-(v/maxRate)*chartH} x2={chartW} y2={chartH-(v/maxRate)*chartH} stroke="var(--chart-grid)" strokeWidth={1}/>
              <text x={-4} y={chartH-(v/maxRate)*chartH+4} fill="var(--chart-text)" fontSize={9} textAnchor="end" fontFamily="'JetBrains Mono',monospace">{v}%</text>
            </g>)}

            {/* Area fill */}
            <defs><linearGradient id="areaGrad" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stopColor="rgba(0,212,126,0.15)"/><stop offset="100%" stopColor="rgba(0,212,126,0)"/>
            </linearGradient></defs>
            <path d={`M0,${chartH} ${rates.map((r,i)=>`L${i*(chartW/(rates.length-1))},${chartH-(r/maxRate)*chartH}`).join(' ')} L${chartW},${chartH} Z`} fill="url(#areaGrad)"/>

            {/* Line */}
            <path d={rates.map((r,i)=>`${i===0?'M':'L'}${i*(chartW/(rates.length-1))},${chartH-(r/maxRate)*chartH}`).join(' ')} fill="none" stroke="var(--green)" strokeWidth={2} style={{filter:"drop-shadow(0 0 4px rgba(0,212,126,0.4))"}}/>

            {/* Dots + labels */}
            {rates.map((r,i)=>{
              const x=i*(chartW/(rates.length-1));
              const y=chartH-(r/maxRate)*chartH;
              const t=testHistory[i];
              return <g key={i}>
                <circle cx={x} cy={y} r={t.active?5:3} fill={t.active?"var(--green)":"var(--chart-dot)"} style={{filter:t.active?"drop-shadow(0 0 6px rgba(0,212,126,0.6))":"none"}}/>
                <text x={x} y={chartH+14} fill="var(--chart-text)" fontSize={8} textAnchor="middle" fontFamily="'JetBrains Mono',monospace">{t.month}</text>
                <text x={x} y={y-8} fill="var(--text2)" fontSize={8} textAnchor="middle" fontFamily="'JetBrains Mono',monospace">{r}%</text>
              </g>;})}
          </svg>
        </Card>

        {/* CURRENT A/B TEST — sits above history */}
        <div style={{fontSize:11,fontWeight:700,textTransform:"uppercase",letterSpacing:"1px",color:"var(--text3)",marginBottom:12}}>Current A/B test</div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr 1fr",gap:14,marginBottom:12}}>
          {[c.a,c.b].map((s,i)=><Card key={i} style={{padding:18,borderColor:i===0?"rgba(79,172,254,0.15)":"var(--green-bd)",background:i===0?"rgba(79,172,254,0.04)":"var(--green-bg)"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
              <span style={{fontSize:9,textTransform:"uppercase",letterSpacing:"1px",fontWeight:700,padding:"3px 8px",borderRadius:6,background:i===0?"var(--blue-bg)":"var(--green-bg)",color:i===0?"var(--blue)":"var(--green)"}}>{s.l} ({i===0?"A":"B"})</span>
              {s.w&&<span style={{fontSize:9,color:"var(--green)",fontWeight:700}}>★ WINNING</span>}
            </div>
            <div style={{fontSize:11,fontWeight:600,color:"var(--text2)",marginBottom:6}}>Subject: {s.sub}</div>
            <div style={{fontSize:11,lineHeight:1.7,color:"var(--text3)",whiteSpace:"pre-wrap",maxHeight:100,overflow:"hidden"}}>{s.body}</div>
            <div style={{display:"flex",gap:16,marginTop:12,paddingTop:12,borderTop:"1px solid var(--border)"}}>
              {[{v:s.sent,l:"Sent"},{v:s.rep,l:"Replies",c:"var(--green)"},{v:s.rate+"%",l:"Rate"}].map((m,j)=>
                <div key={j} style={{textAlign:"center"}}>
                  <div style={{fontFamily:"var(--mono)",fontSize:16,fontWeight:600,color:m.c||"var(--text)"}}>{m.v}</div>
                  <div style={{fontSize:8,color:"var(--text3)",marginTop:2,textTransform:"uppercase"}}>{m.l}</div>
                </div>)}
            </div>
          </Card>)}
        </div>

        {/* Test progress */}
        <div style={{marginBottom:24}}>
          <div style={{display:"flex",justifyContent:"space-between",fontSize:10,color:"var(--text3)",marginBottom:6}}>
            <span>Test progress — evaluates at {c.tgt} sends</span>
            <span style={{fontFamily:"var(--mono)"}}>{c.sent}/{c.tgt}</span>
          </div>
          <div style={{height:4,background:"var(--bg3)",borderRadius:2,overflow:"hidden"}}>
            <div style={{height:"100%",width:c.prog+"%",borderRadius:2,background:"var(--green)"}}/>
          </div>
        </div>

        {/* A/B TEST HISTORY — most recent first, clickable */}
        <div style={{fontSize:11,fontWeight:700,textTransform:"uppercase",letterSpacing:"1px",color:"var(--text3)",marginBottom:12}}>
          Optimisation history — {testHistory.filter(t=>!t.active).length} past experiments
        </div>
        <div style={{maxHeight:400,overflowY:"auto",marginBottom:24}}>
          {[...testHistory].filter(t=>!t.active).reverse().map((t,i,arr)=>{
            const isLast=i===arr.length-1;
            const won=t.winner==="challenger";
            const lost=t.winner==="baseline";
            const isExpanded=expandedExp===t.id;
            return <div key={t.id}>
              <div className="hoverable" onClick={()=>setExpandedExp(isExpanded?null:t.id)} style={{display:"flex",gap:12,position:"relative",cursor:"pointer",padding:"4px 0",borderRadius:4}}>
              {/* Timeline line */}
              {!isLast&&<div style={{position:"absolute",left:11,top:28,bottom:-4,width:2,
                background:"var(--border)"}}/>}
              {/* Dot */}
              <div style={{width:24,height:24,borderRadius:8,flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center",
                background:won?"var(--green-bg)":"rgba(255,255,255,0.03)",
                border:"1px solid "+(won?"rgba(0,212,126,0.15)":"var(--border)"),
                marginTop:2}}>
                <span style={{fontSize:9,fontWeight:700,color:won?"var(--green)":"var(--text3)"}}>{won?"↑":"="}</span>
              </div>
              {/* Content */}
              <div style={{flex:1,paddingBottom:8,borderBottom:isLast?"none":"1px solid var(--border)"}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                  <div style={{display:"flex",alignItems:"center",gap:6}}>
                    <span style={{fontSize:12,fontWeight:600}}>{t.id}</span>
                    <span style={{fontSize:10,color:"var(--text3)",fontFamily:"var(--mono)"}}>{t.month} {t.week}</span>
                  </div>
                  <div style={{display:"flex",alignItems:"center",gap:8}}>
                    <span style={{fontSize:10,fontFamily:"var(--mono)",color:"var(--text3)"}}>{t.baseline.rate}%</span>
                    <span style={{fontSize:10,color:won?"var(--green)":"var(--text3)"}}>→</span>
                    <span style={{fontSize:10,fontFamily:"var(--mono)",fontWeight:600,color:won?"var(--green)":"var(--text3)"}}>{t.challenger.rate}%</span>
                    {won&&<span style={{fontSize:8,padding:"1px 5px",borderRadius:4,background:"var(--green-bg)",color:"var(--green)",fontWeight:700}}>↑</span>}
                    <span style={{fontSize:10,color:"var(--text3)",transform:isExpanded?"rotate(180deg)":"rotate(0)",transition:"transform .2s"}}>▾</span>
                  </div>
                </div>
                <div style={{fontSize:11,color:"var(--text3)",marginTop:3,lineHeight:1.5}}>{t.learning}</div>
              </div>
              </div>

              {/* Expanded A/B copy detail */}
              {isExpanded&&<div style={{marginLeft:36,marginBottom:12,padding:16,border:"1px solid var(--border)",borderRadius:6,background:"var(--bg)"}}>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr 1fr",gap:12}}>
                  <div style={{padding:12,borderRadius:6,background:"var(--blue-bg)",border:"1px solid rgba(79,172,254,0.1)"}}>
                    <div style={{fontSize:9,fontWeight:700,color:"var(--blue)",marginBottom:6}}>BASELINE (A) {!won&&lost?"— WINNER":""}</div>
                    <div style={{fontSize:11,fontWeight:600,color:"var(--text2)",marginBottom:4}}>Subject: {t.baseline.sub}</div>
                    <div style={{fontFamily:"var(--mono)",fontSize:16,fontWeight:600,marginTop:8}}>{t.baseline.rate}%<span style={{fontSize:10,color:"var(--text3)",fontWeight:400}}> reply rate</span></div>
                  </div>
                  <div style={{padding:12,borderRadius:6,background:won?"var(--green-bg)":"rgba(255,255,255,0.02)",border:"1px solid "+(won?"var(--green-bd)":"var(--border)")}}>
                    <div style={{fontSize:9,fontWeight:700,color:won?"var(--green)":"var(--text3)",marginBottom:6}}>CHALLENGER (B) {won?"— WINNER":""}</div>
                    <div style={{fontSize:11,fontWeight:600,color:"var(--text2)",marginBottom:4}}>Subject: {t.challenger.sub}</div>
                    <div style={{fontFamily:"var(--mono)",fontSize:16,fontWeight:600,marginTop:8}}>{t.challenger.rate}%<span style={{fontSize:10,color:"var(--text3)",fontWeight:400}}> reply rate</span></div>
                  </div>
                </div>
              </div>}
            </div>;})}
        </div>

        {/* REPLIES */}
        {cr.length>0&&<><div style={{fontSize:11,fontWeight:700,textTransform:"uppercase",letterSpacing:"1px",color:"var(--text3)",marginBottom:10}}>Replies from this campaign</div>
        {cr.map((r,i)=><Reply key={i} r={r}/>)}</>}
      </div>
    </div>
  </div>;
}

function WarmupProgress({compact}){
  const a=D.account;
  const pct=Math.round(a.daysSinceStart/a.warmupDays*100);
  const daysLeft=Math.max(0,a.warmupDays-a.daysSinceStart);

  if(compact) return <Card style={{padding:24,marginBottom:32,borderColor:"var(--green-bd)",background:"linear-gradient(135deg,rgba(0,212,126,0.04),rgba(0,212,126,0.01))"}}>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:16}}>
      <div>
        <div style={{fontSize:11,fontWeight:700,textTransform:"uppercase",letterSpacing:"1px",color:"var(--green)",marginBottom:4}}>Account warmup</div>
        <div style={{fontSize:22,fontWeight:800}}>{daysLeft>0?daysLeft+" days remaining":"Warmup complete"}</div>
        <div style={{fontSize:11,color:"var(--text3)",marginTop:2}}>Day {a.daysSinceStart} of {a.warmupDays} · {pct}% complete</div>
      </div>
      <div style={{textAlign:"right"}}>
        <div style={{fontSize:11,color:"var(--text3)"}}>Current volume</div>

      </div>
    </div>
    <div style={{height:6,background:"var(--bg3)",borderRadius:3,overflow:"hidden",marginBottom:16}}>
      <div style={{height:"100%",width:pct+"%",borderRadius:3,background:"var(--green)",transition:"width 1s ease"}}/>
    </div>
    <div style={{display:"flex",gap:0}}>
      {a.milestones.map((m,i)=>{
        const mPct=Math.round(m.day/a.warmupDays*100);
        return <div key={i} style={{flex:1,textAlign:"center",position:"relative"}}>
          <div style={{width:m.current?14:10,height:m.current?14:10,borderRadius:"50%",margin:"0 auto 6px",
            background:m.done?"var(--green)":m.current?"var(--green)":"var(--border)",

            border:m.current?"2px solid var(--green2)":"none",

        </div>;})}

  // Full version for dedicated section
  return <div style={{marginBottom:32}}>
    <div style={{fontSize:13,fontWeight:700,marginBottom:14,textTransform:"uppercase",letterSpacing:"1px",color:"var(--text3)"}}>Account progress</div>

    {/* Main progress card */}
    <Card style={{padding:28,marginBottom:14,borderColor:"var(--green-bd)",background:"linear-gradient(135deg,rgba(0,212,126,0.04),rgba(0,212,126,0.01))"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:20}}>
        <div>
          <div style={{fontSize:11,fontWeight:700,textTransform:"uppercase",letterSpacing:"1px",color:"var(--green)",marginBottom:6}}>Warmup progress</div>
          <div style={{fontSize:28,fontWeight:800}}>{daysLeft>0?<>{daysLeft} <span style={{fontSize:14,color:"var(--text2)",fontWeight:500}}>days remaining</span></>:<span style={{color:"var(--green)"}}>Complete</span>}</div>
        </div>
        <div style={{textAlign:"right"}}>
          <div style={{fontFamily:"var(--mono)",fontSize:11,color:"var(--text3)"}}>Day {a.daysSinceStart}/{a.warmupDays}</div>
          <div style={{fontFamily:"var(--mono)",fontSize:28,fontWeight:700,color:"var(--green)"}}>{pct}%</div>
        </div>
      </div>
      <div style={{height:8,background:"var(--bg3)",borderRadius:4,overflow:"hidden"}}>
        <div style={{height:"100%",width:pct+"%",borderRadius:4,background:"var(--green)",transition:"width 1s ease"}}/>
      </div>

    {/* Milestone timeline */}
    <Card style={{padding:24,marginBottom:14}}>
      <div style={{fontSize:11,fontWeight:700,textTransform:"uppercase",letterSpacing:"1px",color:"var(--text3)",marginBottom:16}}>Milestones</div>

        const isLast=i===a.milestones.length-1;
        return <div key={i} style={{display:"flex",gap:14,paddingBottom:isLast?0:16,position:"relative"}}>
          {!isLast&&<div style={{position:"absolute",left:11,top:24,bottom:0,width:2,
            background:m.done?"var(--green)":"var(--border)",
            boxShadow:"none"}}/>}
          <div style={{width:24,height:24,borderRadius:8,flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,
            background:m.done?"var(--green-bg)":m.current?"var(--green-bg)":"rgba(255,255,255,0.03)",
            border:m.current?"1px solid var(--green-bd)":"1px solid "+(m.done?"var(--green-bd)":"var(--border)"),
            boxShadow:"none"}}>{m.done?"✓":m.icon}</div>

            </div>
            <div style={{fontSize:11,color:"var(--text3)",marginTop:2}}>{m.desc}</div>
            <div style={{fontSize:10,color:"var(--text3)",fontFamily:"var(--mono)",marginTop:2}}>Day {m.day}</div>
          </div>

    <Card style={{padding:24}}>
      <div style={{fontSize:11,fontWeight:700,textTransform:"uppercase",letterSpacing:"1px",color:"var(--text3)",marginBottom:16}}>Volume unlocks</div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(160px,1fr))",gap:10}}>
        {a.weeklyVolume.map((w,i)=><div key={i} style={{padding:16,borderRadius:12,
          background:w.upcoming?"rgba(255,255,255,0.02)":"var(--green-bg)",
          border:"1px solid "+(w.upcoming?w.unlocked?"var(--green-bd)":"var(--border)":"var(--green-bd)"),
          opacity:w.upcoming&&!w.unlocked?0.5:1}}>
          <div style={{fontSize:11,fontWeight:600,color:w.upcoming?"var(--text3)":"var(--green)",marginBottom:6}}>{w.week}</div>
          <div style={{fontFamily:"var(--mono)",fontSize:20,fontWeight:700,color:w.upcoming?"var(--text3)":"var(--text)"}}>
            {w.upcoming?w.max.toLocaleString():w.emails.toLocaleString()}<span style={{fontSize:11,fontWeight:400,color:"var(--text3)"}}> /{w.max.toLocaleString()}</span>
          </div>
          <div style={{fontSize:10,color:"var(--text3)",marginTop:4}}>{w.label}{w.unlocked?" ✨":""}</div>
          {!w.upcoming&&<div style={{height:3,background:"var(--bg3)",borderRadius:2,marginTop:8,overflow:"hidden"}}>
            <div style={{height:"100%",width:Math.round(w.emails/w.max*100)+"%",borderRadius:2,background:"var(--green)",}}/>
          </div>}
        </div>)}
      </div>
    </Card>
  </div>;
}

function LeadDetail({lead,onClose}){
  if(!lead)return null;
  const stColor={delivered:"var(--green)",replied:"var(--green)",pending:"var(--text3)",skipped:"var(--text3)",bounced:"var(--red)"};
  const stGlow={delivered:"0 0 12px rgba(0,212,126,0.4)",replied:"0 0 12px rgba(0,212,126,0.6)",bounced:"0 0 12px rgba(255,71,87,0.4)"};
  const stLabel={delivered:"Delivered",replied:"Replied",pending:"Pending",skipped:"Skipped",bounced:"Bounced"};

  return <div onClick={e=>{if(e.target===e.currentTarget)onClose()}} style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.85)",backdropFilter:"blur(14px)",WebkitBackdropFilter:"blur(14px)",zIndex:100,display:"flex",alignItems:"flex-start",justifyContent:"center",padding:40,overflowY:"auto"}}>
    <div style={{background:"var(--bg2)",border:"1px solid var(--border)",borderRadius:20,width:"100%",maxWidth:700,animation:"fadeIn .3s ease"}}>
      {/* Header */}
      <div style={{padding:"24px 28px",borderBottom:"1px solid var(--border)",display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
        <div>
          <h2 style={{fontSize:20,fontWeight:800}}>{lead.n}</h2>
          <div style={{fontSize:12,color:"var(--text3)",marginTop:4,fontFamily:"var(--mono)"}}>{lead.e}</div>
          <div style={{fontSize:12,color:"var(--text2)",marginTop:2}}>{lead.co} · {lead.ca}</div>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:12}}>
          <span style={{fontSize:9,padding:"4px 10px",borderRadius:20,fontWeight:700,textTransform:"uppercase",letterSpacing:"0.5px",
            background:lead.s==="replied"?"var(--green-bg)":lead.s==="bounced"?"var(--red-bg)":"rgba(255,255,255,0.04)",
            color:lead.s==="replied"?"var(--green)":lead.s==="bounced"?"var(--red)":"var(--text2)",
            border:"1px solid "+(lead.s==="replied"?"var(--green-bd)":lead.s==="bounced"?"rgba(255,71,87,0.2)":"var(--border)")}}>{lead.s}</span>
          <button onClick={onClose} style={{width:32,height:32,borderRadius:8,border:"1px solid var(--border)",background:"transparent",color:"var(--text2)",cursor:"pointer",fontSize:15,display:"flex",alignItems:"center",justifyContent:"center"}}>✕</button>
        </div>
      </div>

      {/* Sequence Flow */}
      <div style={{padding:"28px 28px"}}>
        <div style={{fontSize:11,fontWeight:700,textTransform:"uppercase",letterSpacing:"1px",color:"var(--text3)",marginBottom:24}}>Email sequence flow</div>

        <div style={{position:"relative"}}>
          {lead.steps.map((step,i)=>{
            const isLast=i===lead.steps.length-1;
            const isActive=step.st==="delivered"||step.st==="replied";
            const hasReply=!!step.rpl;

            return <div key={i} style={{position:"relative",paddingLeft:40,paddingBottom:isLast?0:32,minHeight:isLast?'auto':80}}>

              {/* Vertical connecting line */}
              {!isLast&&<div style={{position:"absolute",left:15,top:32,bottom:0,width:2,
                background:isActive?"var(--green)":"var(--border)",
                boxShadow:"none"}}/>}

              {/* Node dot */}
              <div style={{position:"absolute",left:8,top:8,width:16,height:16,borderRadius:"50%",
                background:stColor[step.st]||"var(--text3)",
                border:"2px solid "+(stColor[step.st]||"var(--text3)"),
                boxShadow:stGlow[step.st]||"none",
                display:"flex",alignItems:"center",justifyContent:"center"}}>
                {step.st==="delivered"&&<div style={{width:6,height:6,borderRadius:"50%",background:"#000"}}/>}
                {step.st==="replied"&&<div style={{width:0,height:0,borderLeft:"5px solid #000",borderTop:"3px solid transparent",borderBottom:"3px solid transparent",marginLeft:1}}/>}

                  </div>
                  <div style={{fontSize:12,lineHeight:1.6,color:"var(--text)"}}>{step.rpl.txt}</div>
                </Card>
              </div>}
            </div>;
          })}
        </div>

        {/* Reply action */}
        {lead.s==="replied"&&<div style={{marginTop:24,display:"flex",gap:10}}>
          <a href={"mailto:"+lead.e} style={{display:"inline-flex",alignItems:"center",gap:8,padding:"10px 20px",borderRadius:10,background:"var(--green)",color:"#000",fontSize:12,fontWeight:700,textDecoration:"none",cursor:"pointer",}}>Reply to {lead.n.split(" ")[0]}</a>

        </div>}
      </div>
    </div>
  </div>;
}

          chartData:[840,910,1015,1085,1175,1225,1295,1330,1365,1386,1400,1400,1400,1400],
          chartLabel:"Weekly send volume ramp (emails/week)"
        },

          metrics:[{l:"Weekly volume",v:"2,100+/wk"},{l:"Self-learning",v:"Continuous"},{l:"Expected replies",v:"3-5%"},{l:"Monthly volume",v:"9,000+"}],
          chartData:[1400,1540,1680,1785,1855,1925,1974,2030,2065,2086,2100,2100,2100,2100],

              <div style={{fontSize:11,color:"var(--text3)",marginTop:2}}>Includes dedicated mailboxes, warmup, and A/B testing</div>
            </div>
            <div style={{textAlign:"right",flexShrink:0}}>
              <div style={{fontFamily:"var(--mono)",fontSize:20,fontWeight:700,color:opt.popular?"var(--green)":"var(--text)"}}>{opt.price}</div>
              <div style={{fontSize:10,color:"var(--text3)"}}>{opt.per}</div>
            </div>
          </div>)}

          <div style={{marginTop:16,fontSize:11,color:"var(--text3)",lineHeight:1.6}}>
            New slots include fresh sending domains and mailboxes. Warmup begins immediately after purchase. Volume ramps up automatically.
          </div>

          <div style={{marginTop:20,display:"flex",gap:10}}>
            <div style={{flex:1,padding:"12px",borderRadius:10,background:"var(--green)",color:"#000",fontSize:13,fontWeight:700,textAlign:"center",cursor:"pointer",}}>Purchase slots</div>
            <div onClick={()=>setShowAdd(false)} style={{padding:"12px 20px",borderRadius:10,background:"var(--glass)",border:"1px solid var(--border)",color:"var(--text2)",fontSize:13,fontWeight:600,cursor:"pointer",textAlign:"center"}}>Cancel</div>
          </div>
        </div>
      </div>
    </div>}

    {/* Unified Campaign Modal */}
    {configCampaign&&<CampaignModal configCampaign={configCampaign} custData={custData} setCustData={setCustData} setConfigCampaign={setConfigCampaign} editMode={editMode} setEditMode={setEditMode} validationErr={validationErr} setValidationErr={setValidationErr}/>}

  </div>;
}

ReactDOM.render(<App/>, document.getElementById('root'));
</script>
</body>
</html>
